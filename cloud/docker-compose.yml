version: '3.8'

services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${HTTPS_PORT:-443}:443"
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: cloud/Dockerfile
    # Not exposed externally — nginx proxies to this
    expose:
      - "8083"
    environment:
      - DATABASE_URL=postgresql+asyncpg://scensus:${POSTGRES_PASSWORD}@postgres:5432/scensus
      - REDIS_URL=redis://redis:6379/0
      - SRTM_CACHE_DIR=/data/srtm
      - HMAC_SECRET=${HMAC_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ENVIRONMENT=${ENVIRONMENT:-production}
    volumes:
      - srtm_data:/data/srtm
      - export_data:/data/exports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: scensus
      POSTGRES_USER: scensus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Not exposed externally in production
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scensus"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: cloud/Dockerfile
    command: python -m logtail_dashboard.workers.metric_worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://scensus:${POSTGRES_PASSWORD}@postgres:5432/scensus
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # Not exposed externally in production
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  srtm_data:
  export_data:
