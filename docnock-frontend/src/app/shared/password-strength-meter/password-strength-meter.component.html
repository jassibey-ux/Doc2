<div class="password-strength" *ngIf="password">
  <div class="strength-bar">
    <div class="strength-segment" [class.active]="strengthScore >= 1" [ngClass]="strengthLevel"></div>
    <div class="strength-segment" [class.active]="strengthScore >= 2" [ngClass]="strengthLevel"></div>
    <div class="strength-segment" [class.active]="strengthScore >= 3" [ngClass]="strengthLevel"></div>
    <div class="strength-segment" [class.active]="strengthScore >= 4" [ngClass]="strengthLevel"></div>
  </div>
  <span class="strength-label" [ngClass]="strengthLevel">{{ strengthLabel }}</span>

  <ul class="strength-checklist">
    <li [class.passed]="checks.minLength">
      <i class="bx" [ngClass]="checks.minLength ? 'bx-check' : 'bx-x'"></i>
      At least 8 characters
    </li>
    <li [class.passed]="checks.hasUppercase">
      <i class="bx" [ngClass]="checks.hasUppercase ? 'bx-check' : 'bx-x'"></i>
      One uppercase letter
    </li>
    <li [class.passed]="checks.hasLowercase">
      <i class="bx" [ngClass]="checks.hasLowercase ? 'bx-check' : 'bx-x'"></i>
      One lowercase letter
    </li>
    <li [class.passed]="checks.hasNumber">
      <i class="bx" [ngClass]="checks.hasNumber ? 'bx-check' : 'bx-x'"></i>
      One number
    </li>
    <li [class.passed]="checks.hasSpecial">
      <i class="bx" [ngClass]="checks.hasSpecial ? 'bx-check' : 'bx-x'"></i>
      One special character
    </li>
  </ul>
</div>
