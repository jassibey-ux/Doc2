<div class="family-portal">
  <!-- Loading State -->
  <div class="family-loading" *ngIf="loading">
    <i class="bx bx-loader-alt bx-spin"></i>
    <p>Verifying your access...</p>
  </div>

  <!-- Error State -->
  <div class="family-error" *ngIf="error && !loading">
    <i class="bx bx-error-circle"></i>
    <h3>Access Error</h3>
    <p>{{ error }}</p>
    <p class="help-text">If you believe this is an error, please contact the care team to request a new invitation link.</p>
  </div>

  <!-- Verified Family Portal -->
  <div class="family-dashboard" *ngIf="verified && !loading">
    <!-- Header -->
    <header class="family-header">
      <div class="header-left">
        <div class="family-logo">
          <img src="assets/images/dash-logo.png" alt="DocNock" />
        </div>
      </div>
      <div class="header-center">
        <span class="portal-title">Family Portal</span>
      </div>
      <div class="header-right">
        <span class="user-greeting" *ngIf="userName">Hi, {{ userName }}</span>
        <button class="btn-logout" (click)="logout()" title="Sign Out">
          <i class="bx bx-log-out"></i>
        </button>
      </div>
    </header>

    <!-- Tab Content -->
    <div class="tab-content">
      <app-family-feed
        *ngIf="activeTab === 'feed'"
        [conversationId]="conversationId">
      </app-family-feed>

      <app-family-chat
        *ngIf="activeTab === 'chat'"
        [conversationId]="conversationId">
      </app-family-chat>

      <app-family-health
        *ngIf="activeTab === 'health'"
        [conversationId]="conversationId">
      </app-family-health>

      <app-family-video
        *ngIf="activeTab === 'video'"
        [conversationId]="conversationId">
      </app-family-video>
    </div>

    <!-- Bottom Tab Bar -->
    <nav class="tab-bar">
      <button class="tab-item" [class.active]="activeTab === 'feed'" (click)="switchTab('feed')">
        <i class="bx bx-news"></i>
        <span>Feed</span>
      </button>
      <button class="tab-item" [class.active]="activeTab === 'chat'" (click)="switchTab('chat')">
        <i class="bx bx-chat"></i>
        <span>Chat</span>
      </button>
      <button class="tab-item" [class.active]="activeTab === 'health'" (click)="switchTab('health')">
        <i class="bx bx-heart"></i>
        <span>Health</span>
      </button>
      <button class="tab-item" [class.active]="activeTab === 'video'" (click)="switchTab('video')">
        <i class="bx bx-video"></i>
        <span>Video</span>
      </button>
    </nav>
  </div>
</div>
