<!-- layout.component.html -->
<div class="layout" [class.collapsed]="isSidebarCollapsed">
  <app-side-bar [isCollapsed]="isSidebarCollapsed" (isCollapsedChange)="isSidebarCollapsed = $event"></app-side-bar>
  <div class="main-content">
    <app-nav-bar (toggle)="toggleSidebar()"></app-nav-bar>
    <app-facility-invitation-banner></app-facility-invitation-banner>
    <router-outlet></router-outlet>
  </div>
</div>
