name: Build Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Sync static assets
        run: |
          rm -rf logtail_dashboard/static/react/assets
          mkdir -p logtail_dashboard/static/react/assets
          cp electron/out/renderer/assets/* logtail_dashboard/static/react/assets/
          cp electron/out/renderer/index.html logtail_dashboard/static/react/index.html
          cp electron/out/renderer/favicon.svg logtail_dashboard/static/react/favicon.svg

      - name: Commit updated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logtail_dashboard/static/react/
          if git diff --cached --quiet; then
            echo "No asset changes to commit"
          else
            git commit -m "build: Update Python static frontend assets to latest build"
            git push
          fi
