name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'docnock-frontend/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: docnock-frontend/package-lock.json

      - name: Install dependencies
        working-directory: docnock-frontend
        run: npm ci

      - name: Build production
        working-directory: docnock-frontend
        run: npx ng build --configuration production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: docnock-frontend/dist/dock-frontend/
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Deploy to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: dist/*
          target: /home/ubuntu/docnock/docnock-frontend/dist/dock-frontend/
          strip_components: 1

      - name: Restart nginx
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/docnock
            docker compose restart nginx
            sleep 2
            curl -sf https://docnock.com || echo "WARNING: Site check failed"
