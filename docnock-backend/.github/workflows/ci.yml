name: CI Pipeline

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      NODE_ENV: local
      DB_HOST: localhost
      DB_PORT: 27017
      DB_NAME: docnock_test
      DB_USERNAME: ""
      DB_PASSWORD: ""
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: ci-test-secret-do-not-use-in-production
      JWT_REFRESH_SECRET: ci-test-refresh-secret
      PHI_ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS1mb3ItY2ktb25seQ==

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for console.log statements
        run: |
          # Fail if console.log found in src/ (excluding scripts/)
          if grep -r --include="*.js" "console\.\(log\|error\|warn\)" src/ --exclude-dir=scripts | grep -v "// eslint-disable" | head -5; then
            echo "::warning::console.log statements found in source code. Use logger instead."
          fi

      - name: Run tests
        run: npm test --if-present

  build:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Docker Build
        run: |
          if [ -f Dockerfile ]; then
            docker build -t docnock-backend:${{ github.sha }} .
          else
            echo "No Dockerfile found, skipping Docker build"
          fi
