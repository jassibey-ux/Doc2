version: '3.8'

services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./docnock-frontend/dist/dock-frontend:/usr/share/nginx/html:ro
      - ./demo-frontend/dist/dock-frontend:/usr/share/nginx/demo-html:ro
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ./docnock-backend
      dockerfile: Dockerfile
    expose:
      - "8055"
      - "9056"
    env_file:
      - ./docnock-backend/.env.production
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    expose:
      - "27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
