<!DOCTYPE html>
<html>
<head>
    <title>Replay Test</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #fff; }
        .pass { color: #10b981; }
        .fail { color: #ef4444; }
        pre { background: #0a0a0a; padding: 10px; border-radius: 4px; overflow-x: auto; }
        button { padding: 10px 20px; margin: 10px 0; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🔍 Replay System Diagnostic</h1>
    <div id="results"></div>

    <script>
        const results = document.getElementById('results');

        function log(message, status = 'info') {
            const className = status === 'pass' ? 'pass' : status === 'fail' ? 'fail' : '';
            results.innerHTML += `<div class="${className}">✓ ${message}</div>`;
        }

        function logError(message) {
            results.innerHTML += `<div class="fail">✗ ${message}</div>`;
        }

        async function runTests() {
            results.innerHTML = '<h2>Running diagnostics...</h2>';

            // Test 1: Check if API is accessible
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                log(`API Health: ${data.status}`, 'pass');
            } catch (e) {
                logError(`API Health failed: ${e.message}`);
                return;
            }

            // Test 2: Check if replay sessions endpoint works
            try {
                const response = await fetch('/api/replay/sessions');
                const data = await response.json();
                log(`Replay Sessions API: ${data.sessions.length} sessions found`, 'pass');
                results.innerHTML += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (e) {
                logError(`Replay Sessions failed: ${e.message}`);
                return;
            }

            // Test 3: Check if loadReplaySessions function exists
            if (typeof loadReplaySessions === 'function') {
                log('loadReplaySessions function exists', 'pass');
            } else {
                logError('loadReplaySessions function NOT FOUND');
            }

            // Test 4: Check if getReplayView function exists
            if (typeof getReplayView === 'function') {
                log('getReplayView function exists', 'pass');
            } else {
                logError('getReplayView function NOT FOUND');
            }

            // Test 5: Try calling loadReplaySessions
            try {
                log('Attempting to call loadReplaySessions()...');
                await loadReplaySessions();
                log('loadReplaySessions() completed successfully', 'pass');
            } catch (e) {
                logError(`loadReplaySessions() failed: ${e.message}`);
                console.error(e);
            }

            results.innerHTML += '<h2>✅ Diagnostic Complete</h2>';
            results.innerHTML += '<p>Check the browser console (F12) for any additional errors.</p>';
        }

        // Auto-run on load
        window.addEventListener('load', runTests);
    </script>
</body>
</html>
